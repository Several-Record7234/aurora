<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurora Settings</title>
  <link rel="stylesheet" href="/src/shared/base.css">
  <link rel="stylesheet" href="/src/menu/main.css">
</head>
<body>
  <div class="container">
    <!-- 1. Header with toggle -->
    <div class="header-row">
      <span class="header-title">Aurora</span>
      <div class="header-toggle">
        <span class="toggle-label" id="toggleLabel">Enabled</span>
        <div class="toggle-switch" id="masterToggle"
             role="switch" aria-checked="false" aria-labelledby="toggleLabel">
          <div class="toggle-slider"></div>
        </div>
      </div>
    </div>

    <!-- 2. Preset Load / Save -->
    <div class="preset-section">
      <select id="presetSelect" class="preset-select" aria-label="Load preset">
        <option value="" disabled selected>Load Preset...</option>
      </select>
      <button class="preset-btn save" id="savePresetBtn">Save Current As...</button>
    </div>

    <!-- 3. Map Area FX: Saturation, Lightness -->
    <div class="section-header">Map Area FX</div>

    <div class="slider-group">
      <div class="slider-label">
        <span id="satLabel">Saturation</span>
        <span class="slider-value" id="satValue">100%</span>
      </div>
      <input type="range" id="satSlider" min="0" max="200" value="100"
             aria-labelledby="satLabel" aria-valuetext="100%">
    </div>

    <div class="slider-group">
      <div class="slider-label">
        <span id="lightLabel">Lightness</span>
        <span class="slider-value" id="lightValue">100%</span>
      </div>
      <input type="range" id="lightSlider" min="0" max="200" value="100"
             aria-labelledby="lightLabel" aria-valuetext="100%">
    </div>

    <!-- 4. Tint Overlay: Hue, Opacity, Blend Mode -->
    <div class="section-header">Tint Overlay</div>

    <div class="slider-group">
      <div class="slider-label">
        <span id="hueLabel">Hue</span>
        <span class="slider-value" id="hueValue">0°</span>
      </div>
      <input type="range" id="hueSlider" min="-180" max="180" value="0"
             aria-labelledby="hueLabel" aria-valuetext="0°">
    </div>

    <div class="slider-group">
      <div class="slider-label">
        <span id="opacityLabel">Opacity</span>
        <span class="slider-value" id="opacityValue">0%</span>
      </div>
      <input type="range" id="opacitySlider" min="0" max="100" value="0"
             aria-labelledby="opacityLabel" aria-valuetext="0%">
    </div>

    <!-- Blend mode: hidden from UI but functional in code.
         Presets set the blend mode automatically when loaded.
         To re-enable, remove the display:none style below. -->
    <div class="blend-group" style="display: none;">
      <div class="blend-label">
        <span>Blend Mode</span>
      </div>
      <select id="blendSelect" class="blend-select" aria-label="Blend mode">
      </select>
    </div>

    <!-- 5. Edge Fade -->
    <div class="section-header">Edge Fade</div>

    <div class="slider-group">
      <div class="feather-row">
        <div class="feather-slider-wrap">
          <div class="slider-label">
            <span id="featherLabel">Feather</span>
            <span class="slider-value" id="featherValue">0%</span>
          </div>
          <input type="range" id="featherSlider" min="0" max="100" value="0"
                 aria-labelledby="featherLabel" aria-valuetext="0%">
        </div>
        <button class="invert-btn" id="invertBtn" aria-pressed="false">Invert</button>
      </div>
    </div>

    <!-- 6. Crisp / Dreamy -->
    <div class="section-header">Crisp &larr;&nbsp;&nbsp;&rarr; Dreamy</div>

    <div class="slider-group">
      <div class="slider-label">
        <span id="dreamyLabel">&#8212;</span>
        <span class="slider-value" id="dreamyValue">0</span>
      </div>
      <input type="range" id="dreamySlider" min="-100" max="100" value="0"
             aria-labelledby="dreamyLabel" aria-valuetext="0">
    </div>

    <!-- 7. Divider -->
    <div class="divider"></div>

    <!-- 8. Reset / Remove -->
    <div class="action-row">
      <button class="reset-btn" id="resetBtn">Reset</button>
      <button class="remove-btn" id="removeBtn">Remove Aurora</button>
    </div>
  </div>

  <script type="module" src="/src/menu/main.ts"></script>
</body>
</html>
